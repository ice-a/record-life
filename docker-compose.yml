services:
  app:
    build: .
    container_name: re-save-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    env_file:
      - .env.local
    environment:
      PORT: 3000
    depends_on:
      - mongo

  mongo:
    image: mongo:7
    container_name: re-save-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data:
